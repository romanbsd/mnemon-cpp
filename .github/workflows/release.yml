name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            asset: linux-amd64
          - runner: ubuntu-24.04-arm
            asset: linux-arm64
          - runner: macos-15-intel
            asset: macos-amd64
          - runner: macos-15
            asset: macos-arm64

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.asset }})

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13

      - name: Configure & build (Linux)
        if: runner.os == 'Linux'
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Configure & build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Unit tests
        run: cd build && ctest --output-on-failure

      - uses: actions/upload-artifact@v7
        with:
          name: mnemon-${{ matrix.asset }}-${{ github.ref_name }}
          path: build/mnemon

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: mnemon-*-${{ github.ref_name }}
          merge-multiple: false

      - name: Prepare release files
        run: |
          cp "release-assets/mnemon-linux-amd64-${{ github.ref_name }}/mnemon" "mnemon-linux-amd64"
          cp "release-assets/mnemon-linux-arm64-${{ github.ref_name }}/mnemon" "mnemon-linux-arm64"
          cp "release-assets/mnemon-macos-amd64-${{ github.ref_name }}/mnemon" "mnemon-macos-amd64"
          cp "release-assets/mnemon-macos-arm64-${{ github.ref_name }}/mnemon" "mnemon-macos-arm64"

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            mnemon-linux-amd64
            mnemon-linux-arm64
            mnemon-macos-amd64
            mnemon-macos-arm64
          draft: false
          prerelease: false
          generate_release_notes: true
